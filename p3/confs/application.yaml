# ==============================================================================
# Argo CD Application Configuration
# This links the Kubernetes cluster to the public GitHub repository
# ==============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: iot-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/maxenceguy/mguy-iot-app-confs.git'
    targetRevision: HEAD
    path: '.' # We will put the app yaml files at the root of the public repo
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev # The app must be deployed in the dev namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
