- name: Install K3D server
  shell: > 
    wget -q -O - https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

- name: Create K3D cluser {{ k3d_cluser_name }}
  shell: >
    k3d cluster create {{ k3d_cluser_name }}
