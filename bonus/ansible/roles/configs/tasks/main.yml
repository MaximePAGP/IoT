- name: Copy configs from templates into role tmp folder
  template:
    src: "{{ item.src }}"
    dest: "{{ role_path }}/tmp/{{ item.dest }}"
  loop:
    - { src: "services.yml.j2", dest: "services.yml" }
    - { src: "cluster.yml.j2", dest: "cluster.yml" }
    - { src: "argocd_config.yml.j2", dest: "argocd_config.yml" }

- name: Delete old cluster
  ansible.builtin.shell: k3d cluster delete {{ k3d_cluster_name }} || true
  ignore_errors: true

- name: Create cluster
  ansible.builtin.shell: k3d cluster create {{ k3d_cluster_name }} -c {{ role_path }}/tmp/cluster.yml

- name: Wait for nodes
  ansible.builtin.shell: kubectl wait --for=condition=Ready nodes --all --timeout=120s

- name: Create namespaces
  ansible.builtin.shell: kubectl create namespace {{ item }} || true
  loop:
    - argocd
    - gitlab
    - dev

- name: Add gitea helm repo
  ansible.builtin.shell: |
    helm repo add gitea-charts https://dl.gitea.com/charts/
    helm repo update

- name: Install gitea via helm
  ansible.builtin.shell: |
    helm upgrade --install gitea gitea-charts/gitea \
      --namespace gitlab \
      --set gitea.admin.username={{ gitea_admin_user }} \
      --set gitea.admin.password={{ gitea_admin_password }} \
      --set gitea.admin.email=gitea@local.dev \
      --set service.http.type=ClusterIP \
      --wait --timeout=300s

- name: Apply NodePort services
  ansible.builtin.shell: kubectl apply -f {{ role_path }}/tmp/services.yml

- name: Wait for Gitea pod to be ready
  ansible.builtin.shell: |
    kubectl wait --for=condition=Ready pod \
      -l app.kubernetes.io/name=gitea \
      -n gitlab \
      --timeout=180s
  become: true

- name: Create wil-app repository in Gitea
  ansible.builtin.uri:
    url: "http://localhost:8081/api/v1/user/repos"
    method: POST
    user: "{{ gitea_admin_user }}"
    password: "{{ gitea_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      name: wil-app
      private: false
      auto_init: true
      default_branch: main
    status_code: [201, 409]

- name: Create ArgoCD repo secret for Gitea
  ansible.builtin.shell: |
    kubectl -n argocd create secret generic gitea-repo \
      --from-literal=url=http://gitea-http.gitlab.svc.cluster.local:8081/{{ gitea_admin_user }}/wil-app.git \
      --from-literal=username={{ gitea_admin_user }} \
      --from-literal=password={{ gitea_admin_password }} \
      --from-literal=type=git \
      --dry-run=client -o yaml \
    | kubectl annotate --local -f - argocd.argoproj.io/secret-type=repository -o yaml \
    | kubectl apply -f -

- name: Install ArgoCD
  ansible.builtin.shell: kubectl apply -n argocd --server-side --force-conflicts -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

- name: Wait for ArgoCD to be ready
  ansible.builtin.shell: |
    kubectl wait --for=condition=Ready pod \
      -l app.kubernetes.io/name=argocd-server \
      -n argocd \
      --timeout=180s

- name: Install bcrypt
  ansible.builtin.pip:
    name: bcrypt
    state: present
  become: true

- name: Hash ArgoCD password
  ansible.builtin.shell: >
    python3 -c "import bcrypt; print(bcrypt.hashpw(b'{{ argocd_admin_password }}', bcrypt.gensalt()).decode())"
  register: password_hash
  no_log: true

- name: Update ArgoCD password
  ansible.builtin.shell: >
    kubectl -n argocd patch secret argocd-secret \
      -p '{"stringData": {"admin.password": "{{ password_hash.stdout }}", "admin.passwordMtime": "'$(date +%FT%T%Z)'"}}'
  no_log: true

- name: Create ArgoCD Application
  ansible.builtin.shell: kubectl apply -f {{ role_path }}/tmp/argocd_config.yml

- name: Push wil-app.yml to Gitea
  ansible.builtin.shell: |
    rm -rf /tmp/wil-app-repo
    mkdir -p /tmp/wil-app-repo
    cd /tmp/wil-app-repo
    git init
    git checkout -b main
    git config user.email "gitea@local.dev"
    git config user.name "gitea"
    cp {{ role_path }}/files/wil-app.yml .
    git add wil-app.yml
    git commit -m "initial wil-app deployment"
    git remote add origin http://{{ gitea_admin_user }}:{{ gitea_admin_password }}@localhost:8081/{{ gitea_admin_user }}/wil-app.git
    git push -u origin main --force