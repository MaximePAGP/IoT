apiVersion: v1
kind: Service
metadata:
  name: gitlab-nodeport
  namespace: gitlab
spec:
  type: NodePort
  selector:
    app: webservice
    release: gitlab
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30081

---
apiVersion: v1
kind: Service
metadata:
  name: argocd-server-nodeport
  namespace: argocd
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: argocd-server
  ports:
    - port: 443
      targetPort: 8080
      nodePort: 30082 

---
apiVersion: v1
kind: Service
metadata:
  name: will-app-nodeport
  namespace: dev
spec:
  type: NodePort
  selector:
    app: will-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30090