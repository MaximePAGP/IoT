- name: Download Helm installation script
  get_url:
    url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-4
    dest: ./get_helm.sh
    mode: "0700"

- name: Install Helm
  ansible.builtin.shell: >
    ./get_helm.sh

- name: Delete file
  ansible.builtin.file:
    path: ./get_helm.sh
    state: absent