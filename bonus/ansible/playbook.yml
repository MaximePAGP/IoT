- name: Setup SSH keys
  hosts: all
  become: yes
  tasks:
    - name: Add host SSH public key to vagrant user
      ansible.posix.authorized_key:
        user: vagrant
        state: present
        key: "{{ lookup('file', lookup('env','HOME') + '/.ssh/id_rsa.pub') }}"

- name: Install common dependencies
  hosts: all
  become: yes
  roles:
    - common


- name: Install K3s
  hosts: all
  become: yes
  roles:
    - k3s_installation
