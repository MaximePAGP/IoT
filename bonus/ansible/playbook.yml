- name: Install common dependencies
  hosts:
  - cluster
  become: yes
  roles:
    - common


- name: Install Docker
  hosts:
  - cluster
  become: yes
  roles:
    - docker_installation

- name: Install Kubectl
  hosts:
  - cluster
  become: yes
  roles:
    - kubectl


- name: Install K3D & configure cluster
  hosts:
  - cluster
  become: yes
  roles:
    - k3d

